# ============================================================================
# Configuración de Tests de Integración - H2 en memoria
# ============================================================================
#
# ¿Por qué H2 en lugar de MySQL?
# - Los tests de integración NO deben depender de servicios externos
# - H2 corre en memoria → tests más rápidos y portables
# - No necesitás MySQL corriendo para ejecutar los tests
# - Cada test arranca con una BD limpia (sin datos residuales)
#
# ¿Cómo funciona?
# - Spring Boot usa este archivo cuando el perfil "test" está activo
# - @SpringBootTest con @ActiveProfiles("test") carga esta config
# - H2 crea una BD temporal en memoria que se destruye al terminar
# ============================================================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate - DDL auto para crear tablas automáticamente
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Desactivar variables de entorno que no existen en tests
spring.main.allow-bean-definition-overriding=true

# JWT - Usar un secret fijo para tests (no necesita ser seguro)
jwt.secret=dGVzdHNlY3JldGtleXRoYXRpc2xvbmdlbm91Z2hmb3JoczI1Ng==
jwt.expiration-ms=86400000

# Desactivar DotEnv para tests (no necesitamos .env)
spring.main.lazy-initialization=false
